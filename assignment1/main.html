<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>

    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 20px;
        font-family: Arial;
      }

      img {
        width: 400px;
        height: 400px;
        object-fit: cover;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      button :hover{
        color: blue;
      }
    </style>
  </head>

  <body>
    <h1 style="background-color: rgb(175, 192, 21);">If no image apperes click on "Click Here"</h1>
    <img src="" alt="random image" />
    <button id="btn">Click Here</button>

    <script>
        // giphy apikeies have some issues and dont load any imgaes
        // fetch('https://api.giphy.com/v1/gifs/translate?api_key=xXzM73AWYFCUQatRf2Ys3EYAU4ILCKZC&s=cats')
        
      const img = document.querySelector("img");
      const button = document.querySelector("#btn");

      async function fetch_img() {
        const random = Math.floor(Math.random() * 1000);
        const url = `https://picsum.photos/400/400?random=${random}`;

        try {
            fetch('https://api.giphy.com/v1/gifs/translate?api_key=xXzM73AWYFCUQatRf2Ys3EYAU4ILCKZC&s=cats')
          const response = await fetch(url);

          img.src = response.url;
        } catch (err) {
          console.error(err);
        } finally {
          console.log("Request finished");
        }
      }

      button.addEventListener("click", fetch_img);
    </script>
  </body>
</html>
